  <script>
    // GitHub Pages SPA redirect decoder — paired with 404.html.
    // If ?p=/blog/foo is present (set by 404.html), rewrites the URL so the router sees the original path.
    (function () {
      var l = window.location;
      if (l.search && l.search.indexOf('?p=/') === 0) {
        var decoded = l.search.slice(3).split('&').map(function (s) { return s.replace(/~and~/g, '&'); });
        var path = decoded[0];
        var query = decoded[1] ? '?' + decoded[1].replace(/^q=/, '') : '';
        history.replaceState(null, '', l.pathname.replace(/\/$/, '') + path + query + l.hash);
      }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
